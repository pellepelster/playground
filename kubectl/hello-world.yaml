---
apiVersion: v1
kind: Namespace
metadata:
  name: playground1
---
apiVersion: v1
kind: Secret
metadata:
  name: hello-world
  namespace: playground1
type: kubernetes.io/basic-auth
stringData:
  username: username1
  password: password1
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: hello-world
  namespace: playground1
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  bootstrap:
    initdb:
      database: hello-world
      owner: username1
      secret:
        name: hello-world
  storage:
    size: 1Gi
---
apiVersion: v1
kind: Namespace
metadata:
  name: playground1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world
  namespace: playground1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
    spec:
      containers:
        - name: hello-world
          image: ghcr.io/pellepelster/solidblocks-hello-world:latest
          env:
            - name: DATABASE_HOST
              value: "hello-world-rw"
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: hello-world
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hello-world
                  key: password
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: hello-world
  namespace: playground1
spec:
  type: LoadBalancer
  selector:
    app: hello-world
  ports:
    - port: 8080
      targetPort: 8080
